<!DOCTYPE html>
<html lang="PT-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.cdnfonts.com/css/br-shape" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/noto-serif-display" rel="stylesheet">
</head>
<body class="containerForm">
    <h1>Cadastre-se aqui! 🌸</h1>
     <p>Para completar seu cadastro, preencha os campos abaixo:</p>
    <form class="signUpForm">
        <div class="input-group">
            <input type="text" id="username" name="username" placeholder="Seu nome" required>
            <i class="bx bxs-user"></i>
        </div>

        <div class="input-group">
            <input type="email" id="email" name="email" placeholder="Seu email" required>
            <i class="bx bxs-envelope"></i>
        </div>

        <div class="input-group">
            <input type="password" id="password" name="password" placeholder="Sua senha" required>
            <i class="bx bxs-lock-alt"></i>
        </div>

        <button type="submit" class="signUp">Sign Up</button>
    </form>
</body>
</html>
